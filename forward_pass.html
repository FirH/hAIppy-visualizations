<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>07 — Neural Network Forward Pass</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --card: #fff; --border: #e2dfd6;
    --text: #1a1917; --muted: #6b6860;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); padding: 32px 24px; }
  .back { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 24px; }
  .back:hover { color: var(--text); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; max-width: 780px; }
  .card-header { padding: 18px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
  .card-idx { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .card-title { font-size: 14px; font-weight: 600; flex: 1; }
  .card-tag { font-family: var(--mono); font-size: 10px; background: #eef2e8; color: #1D6F4A; padding: 2px 8px; border-radius: 3px; }
  .card-body { padding: 24px; overflow-x: auto; }
  .ctrl-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .ctrl-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  input[type="range"] { accent-color: #1D6F4A; width: 150px; }
  .val-badge { font-family: var(--mono); font-size: 11px; background: #f0ede6; padding: 2px 8px; border-radius: 4px; min-width: 44px; text-align: center; }
  .btn { font-size: 11px; padding: 5px 14px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; color: #333; transition: background 0.1s; }
  .btn:hover { background: #f0ede6; }
  .math-panel { margin-top: 14px; border: 1px solid #e0ddd6; border-radius: 8px; background: #f8f7f4; padding: 14px; }
  .math-label { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  #fp-math { font-family: var(--mono); font-size: 11px; line-height: 2; color: #333; white-space: pre-wrap; }
  .pred-row { margin-top: 12px; text-align: center; }
  #fp-pred { font-family: var(--mono); font-size: 20px; font-weight: 600; color: #1D6F4A; }
  #fp-verdict { font-size: 12px; color: #888; margin-left: 8px; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span class="card-idx">07</span>
    <span class="card-title">Neural Network — Forward Pass Step-by-Step</span>
  </div>
  <div class="card-body">
    <div class="ctrl-row">
      <span class="ctrl-label">x₁</span>
      <input type="range" id="fp-x1" min="-2" max="2" step="0.05" value="0.5">
      <span class="val-badge" id="fp-x1-val">0.50</span>
      <span class="ctrl-label" style="margin-left:12px">x₂</span>
      <input type="range" id="fp-x2" min="-2" max="2" step="0.05" value="0.8">
      <span class="val-badge" id="fp-x2-val">0.80</span>
      <button class="btn" id="fp-animate" style="margin-left:12px">▶ Play step by step</button>
    </div>

    <svg id="fp-svg" width="680" height="300"
         style="display:block;border:1px solid #e0ddd6;border-radius:10px;background:#fff"></svg>

    <div class="math-panel">
      <div class="math-label">Computation</div>
      <div id="fp-math"></div>
    </div>
    <div class="pred-row">
      <span style="font-size:13px;font-weight:600;color:#333">Prediction: </span>
      <span id="fp-pred"></span>
      <span id="fp-verdict"></span>
    </div>
  </div>
</div>

<script>
(function() {
  const ns = "http://www.w3.org/2000/svg";
  const WW = { 11:0.3, 12:0.7, 21:0.5, 22:-0.2, 31:0.6, 32:0.4 };
  const BB = { 1:0.1, 2:0.0, 3:-0.1 };
  const relu    = z => Math.max(0, z);
  const sigmoid = z => 1 / (1 + Math.exp(-z));
  const fmt = (v, d=3) => v.toFixed(d);

  const svg = document.getElementById("fp-svg");
  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
    return e;
  }

  const NODES = {
    x1: { x:100, y:110 },
    x2: { x:100, y:200 },
    h1: { x:330, y: 90 },
    h2: { x:330, y:220 },
    o1: { x:560, y:155 }
  };
  const CONNS = [
    ["x1","h1","w11",0.3], ["x1","h2","w21",0.5],
    ["x2","h1","w12",0.7], ["x2","h2","w22",-0.2],
    ["h1","o1","w31",0.6], ["h2","o1","w32",0.4]
  ];
  const R = 22;
  const COL = { x:"#534AB7", h:"#1D6F4A", o:"#C04E2C" };

  // Layer labels
  [["Input",100],["Hidden (ReLU)",330],["Output (σ)",560]].forEach(([lbl,x]) => {
    const t = el("text", { x, y:28, "text-anchor":"middle", "font-size":11, fill:"#888", "font-weight":600, "font-family":"IBM Plex Sans,sans-serif" });
    t.textContent = lbl;
    svg.appendChild(t);
  });

  // Connections
  CONNS.forEach(([a, b, , w]) => {
    const na = NODES[a], nb = NODES[b];
    const dx = nb.x - na.x, dy = nb.y - na.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    const x1 = na.x + R*dx/d, y1 = na.y + R*dy/d;
    const x2 = nb.x - R*dx/d, y2 = nb.y - R*dy/d;
    svg.appendChild(el("line", { x1, y1, x2, y2, stroke:"#ddd", "stroke-width":1.5 }));
    const t = el("text", { x:(x1+x2)/2, y:(y1+y2)/2-5, "text-anchor":"middle", "font-size":9, fill:"#bbb", "font-family":"IBM Plex Mono,monospace" });
    t.textContent = w;
    svg.appendChild(t);
  });

  // Nodes + labels + value text
  Object.entries(NODES).forEach(([id, {x, y}]) => {
    const col = id.startsWith("x") ? COL.x : id.startsWith("h") ? COL.h : COL.o;
    svg.appendChild(el("circle", { cx:x, cy:y, r:R, fill:col, id:`fp-node-${id}` }));
    const lbl = el("text", { x, y:y+4, "text-anchor":"middle", "font-size":11, fill:"#fff", "font-weight":500, "font-family":"IBM Plex Sans,sans-serif" });
    lbl.textContent = id;
    svg.appendChild(lbl);
    const val = el("text", { x, y:y+R+14, "text-anchor":"middle", "font-size":10, fill:"#555", "font-family":"IBM Plex Mono,monospace", id:`fp-val-${id}` });
    svg.appendChild(val);
  });

  // Bias labels
  [["h1","b₁=0.1"],["h2","b₂=0.0"],["o1","b₃=−0.1"]].forEach(([id, lbl]) => {
    const {x, y} = NODES[id];
    const t = el("text", { x:x+R+4, y:y-R+4, "font-size":9, fill:"#bbb", "font-family":"IBM Plex Mono,monospace" });
    t.textContent = lbl;
    svg.appendChild(t);
  });

  let animTimer = null;

  function compute() {
    const x1 = +document.getElementById("fp-x1").value;
    const x2 = +document.getElementById("fp-x2").value;
    document.getElementById("fp-x1-val").textContent = x1.toFixed(2);
    document.getElementById("fp-x2-val").textContent = x2.toFixed(2);

    const z1 = WW[11]*x1 + WW[12]*x2 + BB[1];
    const h1v = relu(z1);
    const z2 = WW[21]*x1 + WW[22]*x2 + BB[2];
    const h2v = relu(z2);
    const z3 = WW[31]*h1v + WW[32]*h2v + BB[3];
    const o1  = sigmoid(z3);

    // Node value labels
    document.getElementById("fp-val-x1").textContent = fmt(x1, 2);
    document.getElementById("fp-val-x2").textContent = fmt(x2, 2);
    document.getElementById("fp-val-h1").textContent = fmt(h1v, 3);
    document.getElementById("fp-val-h2").textContent = fmt(h2v, 3);
    document.getElementById("fp-val-o1").textContent = fmt(o1, 3);

    // Dead neuron indicator
    document.getElementById("fp-node-h1").setAttribute("fill", h1v > 0 ? COL.h : "#bbb");
    document.getElementById("fp-node-h2").setAttribute("fill", h2v > 0 ? COL.h : "#bbb");

    // Math block
    document.getElementById("fp-math").textContent =
      `z₁ = 0.3×${fmt(x1,2)} + 0.7×${fmt(x2,2)} + 0.1 = ${fmt(z1,3)}   →   h₁ = ReLU(${fmt(z1,3)}) = ${fmt(h1v,3)}\n` +
      `z₂ = 0.5×${fmt(x1,2)} + (−0.2)×${fmt(x2,2)} + 0.0 = ${fmt(z2,3)}   →   h₂ = ReLU(${fmt(z2,3)}) = ${fmt(h2v,3)}\n` +
      `z₃ = 0.6×${fmt(h1v,3)} + 0.4×${fmt(h2v,3)} + (−0.1) = ${fmt(z3,3)}\n` +
      `o₁ = σ(${fmt(z3,3)}) = 1/(1+e^${fmt(-z3,3)}) = ${fmt(o1,3)}`;

    const predEl = document.getElementById("fp-pred");
    const verdictEl = document.getElementById("fp-verdict");
    predEl.textContent = (o1 * 100).toFixed(1) + "%";
    predEl.style.color = o1 >= 0.5 ? "#1D6F4A" : "#C04E2C";
    verdictEl.textContent = o1 >= 0.5 ? "→ class 1 (≥ 0.5)" : "→ class 0 (< 0.5)";
    verdictEl.style.color = o1 >= 0.5 ? "#1D6F4A" : "#C04E2C";
  }

  document.getElementById("fp-x1").addEventListener("input", compute);
  document.getElementById("fp-x2").addEventListener("input", compute);

  const nodeSeq = ["x1","x2","h1","h2","o1"];
  document.getElementById("fp-animate").addEventListener("click", () => {
    if (animTimer) { clearInterval(animTimer); animTimer = null; }
    let step = 0;
    nodeSeq.forEach(id => document.getElementById(`fp-node-${id}`).setAttribute("opacity","0.25"));
    animTimer = setInterval(() => {
      if (step > 0) document.getElementById(`fp-node-${nodeSeq[step-1]}`).setAttribute("opacity","1");
      if (step >= nodeSeq.length) { clearInterval(animTimer); animTimer = null; return; }
      document.getElementById(`fp-node-${nodeSeq[step]}`).setAttribute("opacity","1");
      step++;
    }, 700);
  });

  compute();
})();
</script>
</body>
</html>
