<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kernel Trick — Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --card: #fff; --border: #e2dfd6;
    --text: #1a1917; --muted: #6b6860;
    --teal: #5DCAA5; --teal-dk: #0F6E56;
    --coral: #F0997B; --coral-dk: #993C1D;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    padding: 32px 24px;
    min-height: 100vh;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    max-width: 820px;
  }
  .card-header {
    padding: 18px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
  }
  .card-title { font-size: 14px; font-weight: 600; flex: 1; }
  .card-body { padding: 24px; }

  canvas {
    display: block; width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    cursor: grab;
    touch-action: none;
  }
  canvas:active { cursor: grabbing; }

  .controls {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-width: 110px;
  }
  input[type=range] {
    flex: 1;
    accent-color: var(--teal-dk);
    height: 4px;
    cursor: pointer;
  }
  .slider-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    min-width: 36px;
    text-align: right;
  }
  .hint {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    text-align: center;
    margin-top: 4px;
  }
  .legend-row {
    display: flex; gap: 18px; margin-top: 12px;
    font-size: 11px; color: var(--muted); flex-wrap: wrap;
  }
  .legend-row span { display: flex; align-items: center; gap: 5px; }
  .leg-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .btn-row {
    display: flex; gap: 8px; margin-top: 4px;
  }
  .btn {
    font-family: var(--mono); font-size: 11px;
    padding: 6px 14px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--card); color: var(--text);
    cursor: pointer; transition: background .15s;
  }
  .btn:hover { background: var(--bg); }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span class="card-title">Kernel Trick — Interactive 2D → 3D</span>
  </div>
  <div class="card-body">
    <canvas id="c" height="460"></canvas>

    <div class="controls">
      <div class="slider-row">
        <span class="slider-label">Lift (z = r²)</span>
        <input type="range" id="lift" min="0" max="100" value="0" step="1">
        <span class="slider-val" id="lift-val">0%</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Rotate X</span>
        <input type="range" id="rx" min="-90" max="90" value="0" step="1">
        <span class="slider-val" id="rx-val">0°</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Rotate Y</span>
        <input type="range" id="ry" min="-180" max="180" value="0" step="1">
        <span class="slider-val" id="ry-val">0°</span>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="animateTo(0,0,0)">Reset to 2D</button>
        <button class="btn" onclick="animateTo(100,-38,18)">Show 3D view</button>
        <button class="btn" onclick="animateTo(100,-20,0)">Side view</button>
      </div>
    </div>

    <div class="legend-row">
      <span><span class="leg-dot" style="background:#5DCAA5;border:2px solid #0F6E56"></span>Class A — inner cluster</span>
      <span><span class="leg-dot" style="background:#F0997B;border:2px solid #993C1D"></span>Class B — outer ring</span>
    </div>
    <p class="hint">Drag to rotate · Use sliders to control lift and angle · Click buttons for preset views</p>
  </div>
</div>

<script>
// ─── Point data in 2D (normalised, centre=0) ──────────────────────────────────
// Inner cluster (Class A, teal)
const innerRaw = [
  [0,0],[-.2,-.18],[.2,-.16],[-.16,.18],[.14,.14],[-.31,-.01],[.26,-.06]
];
// Outer ring (Class B, coral)
const outerRaw = [
  [-1.5,0],[1.5,0],[0,-1],[0,.9],
  [-.92,-.59],[.92,-.59],[-.92,.58],[.92,.58],
  [-1.67,0],[1.67,0]
];

// Scale to nice world units
const S = 1.4;
const innerPts = innerRaw.map(([x,y]) => ({ x2:x*S, y2:y*S, cls:'A' }));
const outerPts = outerRaw.map(([x,y]) => ({ x2:x*S, y2:y*S, cls:'B' }));
const allPts   = [...innerPts, ...outerPts];

// Compute z = x² + y² for each point, then normalise to [0, 2.5]
allPts.forEach(p => { p.zFull = p.x2*p.x2 + p.y2*p.y2; });
const zMax = Math.max(...allPts.map(p => p.zFull));
// Inner has LOW r² → LOW z (they start close to centre)
// But conceptually we INVERT so inner goes HIGH (separated above)
// Class A (inner) → lifted UP; Class B (outer) → stays LOW
// Invert: innerZ = zMax - r², outerZ = r² (scaled)
allPts.forEach(p => {
  const r2 = p.zFull / zMax;
  p.zLift = p.cls === 'A'
    ? 2.8 * (1 - r2 * 0.5)   // inner: high z, slight spread
    : 0.3 + r2 * 0.4;         // outer: low z
});

// ─── Canvas & state ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// Physical pixel size
function resize() {
  const W = canvas.clientWidth;
  canvas.width  = W * devicePixelRatio;
  canvas.height = 460 * devicePixelRatio;
  draw();
}

let lift = 0;    // 0–1: how much z is applied
let rotX = 0;    // degrees
let rotY = 0;    // degrees

// ─── Rotation matrix ─────────────────────────────────────────────────────────
function rotatePoint(x, y, z, rx, ry) {
  const radX = rx * Math.PI / 180;
  const radY = ry * Math.PI / 180;

  // Rotate around Y axis
  const x1 =  x * Math.cos(radY) + z * Math.sin(radY);
  const y1 =  y;
  const z1 = -x * Math.sin(radY) + z * Math.cos(radY);

  // Rotate around X axis
  const x2 = x1;
  const y2 =  y1 * Math.cos(radX) - z1 * Math.sin(radX);
  const z2 =  y1 * Math.sin(radX) + z1 * Math.cos(radX);

  return { x: x2, y: y2, z: z2 };
}

// ─── Project 3D → 2D (simple perspective) ────────────────────────────────────
function project(x, y, z, W, H) {
  const fov  = 520;
  const camZ = 6;
  const scale = fov / (camZ - z);
  return {
    sx: W/2 + x * scale,
    sy: H/2 + y * scale,
    scale
  };
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.save();

  const dpr = devicePixelRatio;

  // ── Axes ──
  // When lift=0 & rot=0 → show 2D axes; gradually fade/transform to 3D
  const axisAlpha = 0.5 + lift * 0.3;
  ctx.strokeStyle = `rgba(180,175,165,${axisAlpha})`;
  ctx.lineWidth   = 1 * dpr;

  // Draw 3D axes as rotated lines
  function drawAxis(x0,y0,z0, x1,y1,z1, label, color) {
    const wz0 = z0 * lift;
    const wz1 = z1 * lift;
    const p0  = rotatePoint(x0, y0, wz0, rotX, rotY);
    const p1  = rotatePoint(x1, y1, wz1, rotX, rotY);
    const s0  = project(p0.x, p0.y, p0.z, W, H);
    const s1  = project(p1.x, p1.y, p1.z, W, H);

    ctx.beginPath();
    ctx.strokeStyle = color || `rgba(180,175,165,${axisAlpha})`;
    ctx.lineWidth   = 0.8 * dpr;
    ctx.setLineDash([]);
    ctx.moveTo(s0.sx, s0.sy);
    ctx.lineTo(s1.sx, s1.sy);
    ctx.stroke();

    // Arrowhead
    const dx = s1.sx - s0.sx, dy = s1.sy - s0.sy;
    const len = Math.hypot(dx, dy);
    if (len > 0) {
      const ux = dx/len, uy = dy/len;
      const ah = 8 * dpr;
      ctx.beginPath();
      ctx.moveTo(s1.sx, s1.sy);
      ctx.lineTo(s1.sx - ah*(ux - uy*0.4), s1.sy - ah*(uy + ux*0.4));
      ctx.lineTo(s1.sx - ah*(ux + uy*0.4), s1.sy - ah*(uy - ux*0.4));
      ctx.closePath();
      ctx.fillStyle = color || `rgba(180,175,165,${axisAlpha})`;
      ctx.fill();
    }

    // Label
    ctx.font = `${11*dpr}px IBM Plex Mono`;
    ctx.fillStyle = color || `rgba(160,155,148,${axisAlpha})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lp = rotatePoint(x1*1.12, y1*1.12, wz1*1.12, rotX, rotY);
    const ls = project(lp.x, lp.y, lp.z, W, H);
    ctx.fillText(label, ls.sx, ls.sy);
  }

  // x1 axis
  drawAxis(-2.5,0,0, 2.5,0,0, 'x₁', `rgba(160,155,148,${axisAlpha})`);
  // x2 axis
  drawAxis(0,-2.5,0, 0,2.5,0, 'x₂', `rgba(160,155,148,${axisAlpha})`);
  // z axis — only visible when lifting
  if (lift > 0.05) {
    const zAlpha = lift * 0.9;
    drawAxis(0,0,0, 0,0,3.5, 'z', `rgba(15,110,86,${zAlpha})`);
  }

  // ── Hyperplane — only show when lifting ──
  if (lift > 0.1) {
    const hZ   = 1.55;  // world z of hyperplane
    const hAlpha = Math.min(1, (lift - 0.1) / 0.4) * 0.85;
    // 4 corners of the hyperplane in world space
    const hCorners2D = [
      [-1.5, -1.4], [ 1.5, -1.4],
      [ 1.5,  1.4], [-1.5,  1.4]
    ];
    const hScreen = hCorners2D.map(([hx, hy]) => {
      const wz = hZ * lift;
      const r  = rotatePoint(hx, hy, wz, rotX, rotY);
      return project(r.x, r.y, r.z, W, H);
    });

    ctx.beginPath();
    ctx.moveTo(hScreen[0].sx, hScreen[0].sy);
    for (let i = 1; i < hScreen.length; i++)
      ctx.lineTo(hScreen[i].sx, hScreen[i].sy);
    ctx.closePath();
    ctx.fillStyle   = `rgba(180,178,168,${hAlpha * 0.15})`;
    ctx.strokeStyle = `rgba(150,148,138,${hAlpha * 0.7})`;
    ctx.lineWidth   = 1 * dpr;
    ctx.setLineDash([6*dpr, 4*dpr]);
    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);

    // "Decision boundary" label at right corner
    const labelCorner = hScreen[1];
    ctx.font = `italic ${10*dpr}px IBM Plex Sans`;
    ctx.fillStyle = `rgba(130,128,120,${hAlpha})`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('Decision boundary', labelCorner.sx + 8*dpr, labelCorner.sy);
  }

  // ── Points ──
  // Sort by z for painter's algorithm
  const projected = allPts.map(p => {
    const wz = p.zLift * lift;
    const r  = rotatePoint(p.x2, p.y2, wz, rotX, rotY);
    const s  = project(r.x, r.y, r.z, W, H);
    return { ...p, sx: s.sx, sy: s.sy, depth: r.z };
  });
  projected.sort((a,b) => a.depth - b.depth);

  projected.forEach(p => {
    const r  = 9 * dpr;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, r, 0, Math.PI*2);
    if (p.cls === 'A') {
      ctx.fillStyle   = '#5DCAA5';
      ctx.strokeStyle = '#0F6E56';
    } else {
      ctx.fillStyle   = '#F0997B';
      ctx.strokeStyle = '#993C1D';
    }
    ctx.lineWidth = 1.5 * dpr;
    ctx.fill();
    ctx.stroke();
  });

  ctx.restore();
}

// ─── Slider controls ─────────────────────────────────────────────────────────
document.getElementById('lift').addEventListener('input', e => {
  lift = e.target.value / 100;
  document.getElementById('lift-val').textContent = e.target.value + '%';
  draw();
});
document.getElementById('rx').addEventListener('input', e => {
  rotX = +e.target.value;
  document.getElementById('rx-val').textContent = e.target.value + '°';
  draw();
});
document.getElementById('ry').addEventListener('input', e => {
  rotY = +e.target.value;
  document.getElementById('ry-val').textContent = e.target.value + '°';
  draw();
});

// ─── Drag to rotate ───────────────────────────────────────────────────────────
let dragging = false, lastX = 0, lastY = 0;

canvas.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  rotY = Math.max(-180, Math.min(180, rotY + dx * 0.5));
  rotX = Math.max(-90,  Math.min(90,  rotX + dy * 0.5));
  document.getElementById('rx').value = Math.round(rotX);
  document.getElementById('ry').value = Math.round(rotY);
  document.getElementById('rx-val').textContent = Math.round(rotX) + '°';
  document.getElementById('ry-val').textContent = Math.round(rotY) + '°';
  draw();
});
canvas.addEventListener('pointerup',   () => { dragging = false; });
canvas.addEventListener('pointerleave',() => { dragging = false; });

// ─── Preset animation ─────────────────────────────────────────────────────────
let animFrame = null;
function animateTo(targetLift, targetRX, targetRY) {
  if (animFrame) cancelAnimationFrame(animFrame);

  const startLift = lift * 100;
  const startRX   = rotX;
  const startRY   = rotY;
  const dur = 900; // ms
  const t0  = performance.now();

  function ease(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

  function frame(now) {
    const t  = Math.min(1, (now - t0) / dur);
    const et = ease(t);

    lift = (startLift + (targetLift - startLift) * et) / 100;
    rotX =  startRX  + (targetRX  - startRX)  * et;
    rotY =  startRY  + (targetRY  - startRY)  * et;

    document.getElementById('lift').value    = Math.round(lift * 100);
    document.getElementById('rx').value      = Math.round(rotX);
    document.getElementById('ry').value      = Math.round(rotY);
    document.getElementById('lift-val').textContent = Math.round(lift*100) + '%';
    document.getElementById('rx-val').textContent   = Math.round(rotX) + '°';
    document.getElementById('ry-val').textContent   = Math.round(rotY) + '°';

    draw();
    if (t < 1) animFrame = requestAnimationFrame(frame);
  }
  animFrame = requestAnimationFrame(frame);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
