<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 — Logic Gates</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --card: #fff; --border: #e2dfd6;
    --text: #1a1917; --muted: #6b6860;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); padding: 32px 24px; }
  .back { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 24px; }
  .back:hover { color: var(--text); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; max-width: 780px; }
  .card-header { padding: 18px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
  .card-idx { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .card-title { font-size: 14px; font-weight: 600; flex: 1; }
  .card-tag { font-family: var(--mono); font-size: 10px; background: #eef2e8; color: #1D6F4A; padding: 2px 8px; border-radius: 3px; }
  .card-body { padding: 24px; overflow-x: auto; }
  .legend-row { display: flex; gap: 16px; margin-top: 12px; font-size: 11px; color: var(--muted); flex-wrap: wrap; align-items: center; }
  .legend-row span { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back to all visualizations</a>
<div class="card">
  <div class="card-header">
    <span class="card-idx">01</span>
    <span class="card-title">Logic Gates — Linear Separability</span>
    <span class="card-tag">Module 9A</span>
  </div>
  <div class="card-body">
    <div id="gates-container"></div>
    <div class="legend-row">
      <span><span class="leg-dot" style="background:#3B6D11"></span> Linearly separable boundary</span>
      <span><span class="leg-dot" style="background:#534AB7;border:2px solid #3B3490"></span> Output = 1</span>
      <span><span class="leg-dot" style="background:#E8E3DA;border:2px solid #9E9988"></span> Output = 0</span>
      <span><span class="leg-dot" style="background:#E24B4A"></span> XOR — not separable</span>
    </div>
  </div>
</div>

<script>
(function() {
  const W = 680, H = 280;
  const PAD = { top: 20, right: 20, bottom: 20, left: 20 };
  const PANEL_W = (W - PAD.left - PAD.right - 36) / 4;
  const PANEL_H = 210;

  const GATES = [
    { id:"and", label:"AND", points:[{a:0,b:0,out:0},{a:1,b:0,out:0},{a:0,b:1,out:0},{a:1,b:1,out:1}],
      separable:true, boundary:[[0.48,1.18],[1.15,0.50]] },
    { id:"or",  label:"OR",  points:[{a:0,b:0,out:0},{a:1,b:0,out:1},{a:0,b:1,out:1},{a:1,b:1,out:1}],
      separable:true, boundary:[[-0.07,0.56],[0.50,-0.09]] },
    { id:"nand",label:"NAND",points:[{a:0,b:0,out:1},{a:1,b:0,out:1},{a:0,b:1,out:1},{a:1,b:1,out:0}],
      separable:true, boundary:[[0.48,1.18],[1.15,0.50]] },
    { id:"xor", label:"XOR", points:[{a:0,b:0,out:0},{a:1,b:0,out:1},{a:0,b:1,out:1},{a:1,b:1,out:0}],
      separable:false, boundary:null }
  ];

  const C = { boundary:"#3B6D11", panelBg:"#F8F8F6", border:"rgba(0,0,0,0.1)", text:"#1a1a1a", muted:"#777" };

  const svg = d3.select("#gates-container").append("svg")
    .attr("width", W).attr("height", H).style("font-family","IBM Plex Sans, sans-serif");

  GATES.forEach((g, gi) => {
    const px = PAD.left + gi * (PANEL_W + 12);
    const py = PAD.top;

    svg.append("rect").attr("x",px).attr("y",py).attr("width",PANEL_W).attr("height",PANEL_H)
      .attr("rx",8).attr("fill",C.panelBg).attr("stroke",C.border);

    svg.append("text").attr("x",px + PANEL_W/2).attr("y",py+18)
      .attr("text-anchor","middle").attr("font-size",12).attr("font-weight",600).attr("fill",C.text)
      .text(g.label);

    const IP = 22, IG = PANEL_W - IP*2;
    const scX = a => px + IP + a * IG;
    const scY = b => py + PANEL_H - IP - b * (PANEL_H - IP*2 - 22) * 0.75;

    [0,1].forEach(v => {
      svg.append("line").attr("x1",scX(v)).attr("y1",py+28).attr("x2",scX(v)).attr("y2",scY(0)+4).attr("stroke","#ddd").attr("stroke-width",0.5);
      svg.append("line").attr("x1",px+IP-4).attr("y1",scY(v)).attr("x2",scX(1)+4).attr("y2",scY(v)).attr("stroke","#ddd").attr("stroke-width",0.5);
    });
    [0,1].forEach(v => {
      svg.append("text").attr("x",scX(v)).attr("y",scY(0)+14).attr("text-anchor","middle").attr("font-size",9).attr("fill",C.muted).text(v);
      svg.append("text").attr("x",px+IP-8).attr("y",scY(v)+3).attr("text-anchor","end").attr("font-size",9).attr("fill",C.muted).text(v);
    });

    if (g.separable && g.boundary) {
      const [p0,p1] = g.boundary;
      svg.append("line")
        .attr("x1",scX(p0[0])).attr("y1",scY(p0[1]))
        .attr("x2",scX(p1[0])).attr("y2",scY(p1[1]))
        .attr("stroke",C.boundary).attr("stroke-width",1.5).attr("stroke-dasharray","5,3");
    }

    g.points.forEach(pt => {
      const fill = pt.out===1 ? "#534AB7" : "#E8E3DA";
      const stroke = pt.out===1 ? "#3B3490" : "#9E9988";
      svg.append("circle")
        .attr("cx",scX(pt.a)).attr("cy",scY(pt.b)).attr("r",7)
        .attr("fill",g.id==="xor" && pt.out===1 ? "#E24B4A" : fill)
        .attr("stroke",g.id==="xor" && pt.out===1 ? "#A82020" : stroke)
        .attr("stroke-width",1.5);
      svg.append("text")
        .attr("x",scX(pt.a)).attr("y",scY(pt.b)+3.5)
        .attr("text-anchor","middle").attr("font-size",8.5).attr("font-weight",500)
        .attr("fill", pt.out===1 ? "#fff" : "#555").text(pt.out);
    });
  });
})();
</script>
</body>
</html>
